<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Ekle - Kelime Ezber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="d-flex min-vh-100">

        <div class="sidebar-bg sidebar-wrapper d-flex flex-column flex-shrink-0 p-3 text-white shadow">
            <a href="dashboard.html" class="d-flex align-items-center mb-4 me-md-auto text-white text-decoration-none">
                <span class="fs-4 fw-bold text-white ms-2 mt-2">Kelime Ezber</span>
            </a>
            <hr class="border-light mt-0 opacity-50">
            
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="dashboard.html" class="sidebar-link">🏠 Ana Sayfa</a></li>
                <li><a href="add-word.html" class="sidebar-link active">➕ Kelime Ekle</a></li>
                <li><a href="word-list.html" class="sidebar-link">📋 Kelime Listesi</a></li>
                <li><a href="quiz.html" class="sidebar-link">📝 Sınav Modülü</a></li>
                <li><a href="report.html" class="sidebar-link">📊 Analiz Raporu</a></li>
                <li><a href="games.html" class="sidebar-link">🎮 Oyunlar</a></li>
            </ul>
            
            <hr class="border-light opacity-50">
            <ul class="nav flex-column">
                <li><a href="settings.html" class="sidebar-link">⚙️ Ayarlar</a></li>
            </ul>
        </div>

        <div class="flex-grow-1 d-flex flex-column">
            
            <header class="p-3 mb-4 bg-primary shadow-sm d-flex justify-content-end align-items-center px-4">
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle fw-bold" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                        <img id="headerAvatar" src="https://ui-avatars.com/api/?name=Bora+Boyraz&background=ffffff&color=0d6efd" alt="Profil" width="32" height="32" class="rounded-circle me-2">
                        Profil
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser">
                        <li><a class="dropdown-item fw-bold text-primary" href="profile.html">👤 Profil Bilgileri</a></li>
                        <li><a class="dropdown-item" href="report.html">📊 Gelişim Raporu</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger fw-bold" href="#">🚪 Çıkış Yap</a></li>
                    </ul>
                </div>
            </header>

            <div class="container px-4">
                <div class="row justify-content-center">
                    <div class="col-md-10">
                        <div class="form-card mt-2">
                            <h3 class="text-primary text-center fw-bold mb-4">Yeni Kelime Ekle</h3>
                            
                            <form id="addWordForm">
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="engWordInput" class="form-label fw-bold">İngilizce Kelime</label>
                                        <input type="text" class="form-control form-control-lg" id="engWordInput" placeholder="Örn: Apple" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="trWordInput" class="form-label fw-bold">Türkçe Karşılığı</label>
                                        <input type="text" class="form-control form-control-lg" id="trWordInput" placeholder="Örn: Elma" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                       <label for="category" class="form-label fw-bold">Kelime Kategorisi</label>
                                       <select class="form-select form-select-lg" id="category" required>
                                          <option value="" selected disabled>Veritabanından Kategoriler Yükleniyor...</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="sentences" class="form-label fw-bold">Örnek Cümleler</label>
                                    <textarea class="form-control" id="sentences" rows="3" placeholder="Kelimenin geçtiği İngilizce örnek cümleleri buraya yazın..." required></textarea>
                                </div>

                                <div class="row mt-4">
                                    <div class="col-md-6 mb-3">
                                        <label for="word-image" class="form-label fw-bold">Görsel Ekle</label>
                                        <input class="form-control" type="file" id="word-image" accept="image/*" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="word-audio" class="form-label fw-bold">Sesli Okunuş (Opsiyonel)</label>
                                        <input class="form-control" type="file" id="word-audio" accept="audio/*">
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Kelimeyi Sisteme Kaydet</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/global.js"></script>
    <script src="js/add-word.js"></script>
</body>
</html>
