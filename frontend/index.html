<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Kelime Ezber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="form-card mt-5">
                    <h2 class="text-center mb-4 text-primary fw-bold">Sisteme Giriş</h2>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">E-posta</label>
                            <input type="text" class="form-control form-control-lg" id="username" placeholder="E-posta adresinizi giriniz" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Şifre</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Şifrenizi girin" required>
                        </div>
                        
                        <div class="mb-4 text-end">
                            <a href="forgot-password.html" class="text-decoration-none text-primary small fw-bold">Şifremi Unuttum</a>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Giriş Yap</button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-0">Hesabın yok mu? <a href="register.html" class="text-decoration-none fw-bold text-primary">Hemen Kayıt Ol</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/global.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
