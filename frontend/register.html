<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Kelime Ezber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="form-card mt-4">
                    <h2 class="text-center mb-4 text-primary fw-bold">Yeni Kayıt Oluştur</h2>
                    
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="reg-username" class="form-label fw-bold">Kullanıcı Adı</label>
                            <input type="text" class="form-control form-control-lg" id="reg-username" placeholder="Bir kullanıcı adı belirleyin" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="reg-email" class="form-label fw-bold">E-posta Adresi</label>
                            <input type="email" class="form-control form-control-lg" id="reg-email" placeholder="örnek@mail.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="reg-password" class="form-label fw-bold">Şifre</label>
                            <input type="password" class="form-control form-control-lg" id="reg-password" placeholder="Şifrenizi belirleyin" required>
                        </div>

                        <div class="mb-4">
                            <label for="reg-password-confirm" class="form-label fw-bold">Şifre Tekrar</label>
                            <input type="password" class="form-control form-control-lg" id="reg-password-confirm" placeholder="Şifrenizi tekrar girin" required>
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Kayıt Ol</button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-0">Zaten bir hesabın var mı? <a href="index.html" class="text-decoration-none fw-bold text-primary">Giriş Yap</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/global.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
