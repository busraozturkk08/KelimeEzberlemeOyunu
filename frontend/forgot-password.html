<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum - Kelime Ezber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="form-card mt-5">
                    <h2 class="text-center mb-4 text-primary fw-bold">Şifre Sıfırlama</h2>
                    <p class="text-muted text-center mb-4">Sisteme kayıtlı e-posta adresinizi girin, şifrenizi sıfırlamanız için size bir bağlantı gönderelim.</p>
                    
                    <form id="forgotPasswordForm">
                        <div class="mb-4">
                            <label for="reset-email" class="form-label fw-bold">E-posta Adresi</label>
                            <input type="email" class="form-control form-control-lg" id="reset-email" placeholder="örnek@mail.com" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Sıfırlama Bağlantısı Gönder</button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-0"><a href="index.html" class="text-decoration-none fw-bold text-primary">← Giriş Sayfasına Dön</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/global.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</html>
