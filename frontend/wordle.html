<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Bulmaca - Kelime Ezber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="d-flex min-vh-100">
        
        <div class="sidebar-bg sidebar-wrapper d-flex flex-column flex-shrink-0 p-3 text-white shadow">
            <a href="dashboard.html" class="d-flex align-items-center mb-4 text-white text-decoration-none">
                <span class="fs-4 fw-bold ms-2 mt-2">Kelime Ezber</span>
            </a>
            <hr class="border-light mt-0 opacity-50">
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="dashboard.html" class="sidebar-link">🏠 Ana Sayfa</a></li>
                <li><a href="add-word.html" class="sidebar-link">➕ Kelime Ekle</a></li>
                <li><a href="word-list.html" class="sidebar-link">📋 Kelime Listesi</a></li>
                <li><a href="quiz.html" class="sidebar-link">📝 Sınav Modülü</a></li>
                <li><a href="report.html" class="sidebar-link">📊 Analiz Raporu</a></li>
                <li><a href="games.html" class="sidebar-link active">🎮 Oyunlar</a></li>
            </ul>
            <hr class="border-light opacity-50">
            <ul class="nav flex-column">
                <li><a href="settings.html" class="sidebar-link">⚙️ Ayarlar</a></li>
            </ul>
        </div>

        <div class="flex-grow-1 d-flex flex-column">
            
            <header class="p-3 mb-4 bg-primary shadow-sm d-flex justify-content-end align-items-center px-4">
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle fw-bold" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                        <img id="headerAvatar" src="https://ui-avatars.com/api/?name=Kullanici+Adi&background=ffffff&color=0d6efd" alt="Profil" width="32" height="32" class="rounded-circle me-2">
                        Profil
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser">
                        <li><a class="dropdown-item fw-bold text-primary" href="profile.html">👤 Profil Bilgileri</a></li>
                        <li><a class="dropdown-item" href="report.html">📊 Gelişim Raporu</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger fw-bold" href="#">🚪 Çıkış Yap</a></li>
                    </ul>
                </div>
            </header>

            <div class="container text-center flex-grow-1">
                
                <div class="game-card">
                    
                    <h2 class="fw-bolder text-primary mb-3 letter-spacing-1">KELİME BULMACA</h2>
                    
                    <div class="d-flex justify-content-center gap-4 mb-3 text-muted fw-bold">
                        <span><i class="text-primary">Kelime uzunluğu:</i> <span id="wordLengthDisplay">0</span> harf</span>
                        <span><i class="text-danger">Kalan tahmin:</i> <span id="remainingDisplay">0</span></span>
                    </div>

                    <div id="hintBoard" class="word-row mb-4">
                        </div>

                    <form id="guessForm" class="d-flex justify-content-center gap-2 mb-2" onsubmit="submitGuess(event)">
                        <input type="text" id="guessInput" class="form-control form-control-lg guess-input w-50" placeholder="Kelimeyi girin..." required autocomplete="off">
                        <button type="submit" class="btn btn-success fw-bold px-4">Tahmin Et</button>
                    </form>
                    
                    <div id="errorMsg" class="small fw-bold mb-3 min-h-20"></div>

                    <div id="historyTitle" class="history-title">Yapılan Tahminler</div>
                    <div id="historyBoard">
                        </div>

                </div>

                <div class="mt-2 pb-4">
                    <a href="games.html" class="btn btn-link text-decoration-none text-muted fw-bold small">← Oyunlara Dön</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/global.js"></script>
    <script src="js/wordle.js"></script>
</body>
</html>
